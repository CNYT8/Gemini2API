services:
  gemini2api:
    build: .
    container_name: gemini2api
    env_file:
      - .env
    ports:
      - "5918:5918"
    tmpfs:
      - /tmp
      - /home/appuser/.cache
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5918/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
