services:
  gemini2api:
    build: .
    container_name: gemini2api
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "5918:5918"
    volumes:
      - ./data:/app/data
      - ./api:/app/api
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo/Asia/Shanghai:/usr/share/zoneinfo/Asia/Shanghai:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/repo
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:5918/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
