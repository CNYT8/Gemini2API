services:
  refresher:
    build: ./refresher
    container_name: gemini-refresher
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - MAX_CONCURRENT=3
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  gemini2api:
    build: .
    container_name: gemini2api
    env_file:
      - .env
    environment:
      - BROWSER_PROXY_URL=http://refresher:8001
    ports:
      - "5918:5918"
    volumes:
      - ./data:/app/data
      - ./api:/app/api
    tmpfs:
      - /tmp
      - /home/appuser/.cache
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:5918/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      refresher:
        condition: service_healthy
    restart: unless-stopped
