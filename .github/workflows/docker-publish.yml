name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Bake the api/ hot-update assets (QR config + images) into the published
      # image so it is self-contained: `.dockerignore` excludes `api` by default
      # (it is a runtime bind-mount target), which would make the Dockerfile's
      # `COPY api/ ./api/` fail and leave /app/api missing -> StaticFiles startup
      # crash on any `docker run` without the bind mount. Un-exclude it here only
      # for the build context; `data` and secrets stay ignored.
      - name: Include api/ assets in build context
        run: sed -i '/^api$/d' .dockerignore

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
