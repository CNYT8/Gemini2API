<link rel="stylesheet" href="components/section-config.css">
<!-- Config Section -->
<section id="config" class="section" aria-labelledby="config-title">
    <h2 id="config-title">配置管理</h2>

    <!-- Current Config Display -->
    <div class="config-card">
        <div class="config-card-header">
            <h3>当前配置</h3>
        </div>
        <div class="config-card-body">
            <div id="configDisplay" class="config-grid">
                <!-- Config items will be loaded here -->
                <div class="config-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>加载中...</span>
                </div>
            </div>
        </div>
    </div>
</section>
