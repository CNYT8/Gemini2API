<link rel="stylesheet" href="components/section-logs.css">
<!-- Logs Section -->
<section id="logs" class="section" aria-labelledby="logs-title">
    <h2 id="logs-title">实时日志</h2>

    <div class="logs-card">
        <div class="logs-card-header">
            <h3>日志输出</h3>
            <div class="logs-controls">
                <label class="auto-scroll-toggle">
                    <input type="checkbox" id="autoScrollLogs" checked>
                    <span>自动滚动</span>
                </label>
                <button class="btn btn-outline btn-sm" id="clearLogsBtn">
                    <i class="fas fa-trash"></i> <span>清空日志</span>
                </button>
            </div>
        </div>
        <div id="logsContainer" class="logs-container" role="log" aria-live="polite" aria-atomic="false">
            <!-- Logs will appear here -->
            <div class="logs-placeholder">
                <i class="fas fa-file-alt"></i>
                <p>等待日志输出...</p>
            </div>
        </div>
    </div>
</section>
