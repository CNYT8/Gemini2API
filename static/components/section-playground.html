<link rel="stylesheet" href="components/section-playground.css">
<!-- Playground Section -->
<section id="playground" class="section" aria-labelledby="playground-title">
    <h2 id="playground-title"><i class="fas fa-flask"></i> Playground</h2>

    <div class="playground-container">
        <!-- Left Panel: Request Config -->
        <div class="playground-panel">
            <h3>请求配置</h3>
            <div class="form-group">
                <label class="form-label">模型</label>
                <select id="pg-model" class="form-control">
                    <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
                    <option value="gemini-2.5-pro-exp-03-25">gemini-2.5-pro-exp-03-25</option>
                    <option value="gemini-2.5-flash-preview-04-17">gemini-2.5-flash-preview-04-17</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">消息内容</label>
                <textarea id="pg-message" class="form-control" placeholder="输入消息..." rows="10"></textarea>
            </div>
            <div class="flex gap-1">
                <button class="btn btn-primary" id="pg-send">
                    <i class="fas fa-paper-plane"></i> 发送
                </button>
                <button class="btn btn-outline" id="pg-clear-btn">
                    <i class="fas fa-redo-alt"></i> 清空
                </button>
            </div>
        </div>

        <!-- Right Panel: Response -->
        <div class="playground-panel">
            <h3>响应结果</h3>
            <div id="pg-response" class="response-area">
                <div class="response-placeholder">
                    <i class="fas fa-comment-dots"></i>
                    <p>发送请求后，响应内容将显示在这里</p>
                </div>
            </div>
        </div>
    </div>
</section>
