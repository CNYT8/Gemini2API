<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Gemini2API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #059669;
            --primary-hover: #047857;
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --error: #dc2626;
            --error-bg: #fee2e2;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --error-bg: #7f1d1d;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-xl);
            padding: 2.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .logo-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .login-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--primary-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-md);
        }

        .login-button:hover:not(:disabled) {
            background: varateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .login-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: var(--error-bg);
            color: var(--error);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rt: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            juntent: center;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .theme-icon {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo-title {
                font-size: 1.75rem;
            }

            .theme-toggle {
                top: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <svg class="theme-icon" id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1 class="logo-title">Gemini2API</h1>
                <p class="logo-subtitle">管理控制台</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="apiKey" class="form-label">API 密钥</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="apiKey"
                            class="form-input"
                            placeholder="请输入您的 API 密钥"
                            autocomplete="off"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="login-button" id="loginButton">
                    <span id="buttonText">登录</span>
                </button>

                <div class="error-message" id="errorMessage"></div>
            </form>

            <p class="footer-text">请使用您的 API 密钥进行身份验证</p>
        </div>
    </div>

    <script>
        // Theme management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('gemini2api_theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('gemini2api_theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            } else {
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            }
        }

        // Login form handling
        const loginForm = document.getElementById('loginForm');
        const apiKeyInput = document.getElementById('apiKey');
        const loginButton = document.getElementById('loginButton');
        const buttonText = document.getElementById('buttonText');
        const errorMessage = document.getElementById('errorMessage');

        const MAX_ATTEMPTS = 5;
        let remainingAttempts = MAX_ATTEMPTS;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (remainingAttempts <= 0) {
                showError('尝试次数已用完，请稍后再试');
                return;
            }

            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                showError('请输入 API 密钥');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('/admin/verify', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    localStorage.setItem('gemini2api_token', apiKey);
                    buttonText.textContent = '登录成功';
                    remainingAttempts = MAX_ATTEMPTS;
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 500);
                } else if (response.status === 401 || response.status === 403) {
                    remainingAttempts--;
                    if (remainingAttempts > 0) {
                        showError(`密码错误。还剩 ${remainingAttempts} 次尝试机会。`);
                    } else {
                        showError('尝试次数已用完，请稍后再试。');
                        loginButton.disabled = true;
                        setTimeout(() => {
                            remainingAttempts = MAX_ATTEMPTS;
                            loginButton.disabled = false;
                        }, 60000);
                    }
                    setLoading(false);
                } else {
                    showError('登录失败，请稍后重试');
                    setLoading(false);
                }
            } catch (error) {
                showError('网络错误，请检查连接');
                setLoading(false);
            }
        });

        function setLoading(loading) {
            loginButton.disabled = loading;
            if (loading) {
                buttonText.innerHTML = '<span class="spinner"></span><span>登录中...</span>';
            } else {
                buttonText.textContent = '登录';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            errorMessage.style.animation = 'none';
            setTimeout(() => {
                errorMessage.style.animation = '';
            }, 10);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        // Focus on input
        apiKeyInput.focus();
    </script>
</body>
</html>
